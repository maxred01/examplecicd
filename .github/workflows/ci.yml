name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          cd cafe-bot
          python -m pytest tests/test_database.py tests/test_bot_worker.py -v

  server-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run server tests
        run: |
          cd cafe_bot
          python -m pytest tests/test_server.py -v

  block-merge:
    needs: [unit-tests, server-tests]
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Tests failed - merging blocked
        run: |
          echo "❌ Тесты не пройдены. Мерж в master запрещён."
          exit 1
