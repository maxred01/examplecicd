name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: |
          cd cafe-bot
          python -m pytest tests/ -v

  block-merge:
    needs: test
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Tests failed - merging blocked
        run: |
          echo "❌ Тесты не пройдены. Мерж в master запрещён."
          exit 1
